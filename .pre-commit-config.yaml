repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: detect-private-key

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: ^dot_bashrc\.d/
        exclude: \.tmpl$
        types: [file]

  - repo: local
    hooks:
      - id: chezmoi-templates
        name: Validate chezmoi templates (syntax only)
        entry: "bash -c 'for f in \"$@\"; do grep -qE \"output|promptString\" \"$f\" && continue; if [ -n \"$CI\" ] && grep -q \"decrypt\" \"$f\"; then continue; fi; chezmoi execute-template --source . < \"$f\" > /dev/null 2>&1 || { echo \"Template error in $f\"; exit 1; }; done' --"
        language: system
        files: (\.tmpl$|\.chezmoiignore$|\.chezmoiremove$)
        pass_filenames: true

      - id: chezmoi-doctor
        name: Run chezmoi doctor
        entry: "bash -c 'chezmoi doctor --no-network --source=$(pwd) || true'"
        language: system
        pass_filenames: false
        always_run: true
        verbose: true

      - id: chezmoi-dry-run
        name: chezmoi apply dry-run
        entry: bash -c 'if [ -z "$CI" ]; then chezmoi apply --dry-run --force --source .; else echo "Skipping dry-run in CI (no decryption key)"; fi'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      - id: chezmoi-secrets-decrypt
        name: Validate secrets decryption and YAML
        entry: bash -c 'if [ -z "$CI" ]; then chezmoi execute-template --source . "{{ fromYaml (include \"encrypted_secrets.yaml.age\" | decrypt) | len }}" > /dev/null; else echo "Skipping secrets check in CI (no decryption key)"; fi'
        language: system
        pass_filenames: false
        always_run: true
