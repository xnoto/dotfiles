<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!--
    Emoji fallback for IBM VGA 8x16 in Alacritty.

    Alacritty uses "Px437 IBM VGA 8x16" as primary font.
    Try Twemoji (Twitter's emoji) as fallback.
  -->
  <alias binding="same">
    <family>Px437 IBM VGA 8x16</family>
    <accept>
      <family>Twemoji</family>
      <family>Noto Emoji</family>
      <family>DejaVu Sans Mono</family>
    </accept>
  </alias>
</fontconfig>
