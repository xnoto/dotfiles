<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!--
    Font configuration for bitmap terminal fonts with fallback chain:
    1. Primary: IBM VGA8 (classic bitmap terminal look)
    2. Fallback #1: Fixedsys Excelsior (extended symbols, programming characters)
    3. Fallback #2: Noto Sans Mono (comprehensive Unicode coverage)
    4. Emoji: Noto Color Emoji (color emoji support)
  -->

  <!--
    Aggressive emoji fallback for all font patterns.
    Alacritty on Linux queries fonts via fontconfig but has limited fallback
    traversal when using custom/bitmap fonts. These rules ensure Noto Color
    Emoji is always in the fallback chain regardless of the primary font.
  -->
  <match target="pattern">
    <test name="family" qual="any"><string>monospace</string></test>
    <edit name="family" mode="append" binding="weak">
      <string>Noto Color Emoji</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family" qual="any"><string>sans-serif</string></test>
    <edit name="family" mode="append" binding="weak">
      <string>Noto Color Emoji</string>
    </edit>
  </match>

  <!-- IBM VGA 8x16: Full fallback chain -->
  <match target="pattern">
    <test name="family" qual="any"><string>Px437 IBM VGA 8x16</string></test>
    <edit name="family" mode="append" binding="weak">
      <string>Fixedsys Excelsior</string>
    </edit>
    <edit name="family" mode="append" binding="weak">
      <string>Noto Sans Mono</string>
    </edit>
    <edit name="family" mode="append" binding="weak">
      <string>Noto Color Emoji</string>
    </edit>
  </match>

  <!-- Fixedsys Excelsior: Add Noto Sans Mono then emoji fallback -->
  <match target="pattern">
    <test name="family" qual="any"><string>Fixedsys Excelsior</string></test>
    <edit name="family" mode="append" binding="weak">
      <string>Noto Sans Mono</string>
    </edit>
    <edit name="family" mode="append" binding="weak">
      <string>Noto Color Emoji</string>
    </edit>
  </match>

  <!-- Prefer bitmap fonts at small sizes to avoid blurry scaling -->
  <match target="font">
    <test name="family" qual="any"><string>Px437 IBM VGA 8x16</string></test>
    <edit name="antialias" mode="assign"><bool>false</bool></edit>
    <edit name="hinting" mode="assign"><bool>false</bool></edit>
  </match>
</fontconfig>
