<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!--
    Font configuration for bitmap terminal fonts with emoji fallback.
    Ensures IBM VGA8 and Fixedsys Excelsior can display emojis via
    system fallback fonts (Noto Color Emoji).
  -->

  <!-- IBM VGA 8x16: Add emoji fallback -->
  <match target="pattern">
    <test name="family" qual="any"><string>Px437 IBM VGA 8x16</string></test>
    <edit name="family" mode="append" binding="weak">
      <string>Noto Color Emoji</string>
    </edit>
  </match>

  <!-- Fixedsys Excelsior: Add emoji fallback -->
  <match target="pattern">
    <test name="family" qual="any"><string>Fixedsys Excelsior</string></test>
    <edit name="family" mode="append" binding="weak">
      <string>Noto Color Emoji</string>
    </edit>
  </match>

  <!-- Prefer bitmap fonts at small sizes to avoid blurry scaling -->
  <match target="font">
    <test name="family" qual="any"><string>Px437 IBM VGA 8x16</string></test>
    <edit name="antialias" mode="assign"><bool>false</bool></edit>
    <edit name="hinting" mode="assign"><bool>false</bool></edit>
  </match>
</fontconfig>
